<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Special Mariam ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#ff4d6d;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:auto;
    font-family:monospace;
}

pre{
    font-size:11px;
    line-height:11px;
    white-space:pre;
    text-align:center;
}
</style>
</head>
<body>

<pre id="heart"></pre>

<script>
const words = "You're special Mariam ";
let heart = "";

for(let y=1.5; y>-1.5; y-=0.07){
    for(let x=-1.5; x<1.5; x+=0.03){
        let a = x*x + y*y - 1;
        if(a*a*a - x*x*y*y*y <= 0){
            heart += words;
        }else{
            heart += " ";
        }
    }
    heart += "\n";
}

document.getElementById("heart").textContent = heart;
</script>

</body>
</html>
